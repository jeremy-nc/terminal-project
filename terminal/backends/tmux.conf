# Minimal isolated tmux config for browser-terminal sessions (socket: -L nct).
# Kept separate from the user's own ~/.tmux.conf via `tmux -f`.

# Pinned sizing: size the window to the LARGEST attached client and don't
# shrink to smaller ones. The browser drives the size; a smaller native
# Terminal window just shows a viewport. This is what avoids the multi-client
# resize/redraw churn (the "ripple") a shared session would otherwise cause.
set -g window-size largest
setw -g aggressive-resize off

# No status bar: a browser tab should look like a plain shell, not tmux.
set -g status off

# Snappy escape handling and broad-compatible terminal type.
set -g escape-time 0
set -g default-terminal "xterm-256color"

# Keep a program's output visible after it exits, with "[exited]" below it:
#   - alternate-screen off: programs inside tmux render on the pane's main
#     screen (not a scratch alt-screen), so their final output stays in scrollback.
#   - smcup@/rmcup@: strip the alternate-screen capability from the OUTER
#     terminal so tmux's own client draws on the main screen too — when the
#     client exits it leaves the content in place and appends "[exited]", instead
#     of restoring a blank screen.
# Lifecycle is unchanged (program exits -> session destroyed -> PTY EOF), so the
# coordinator still detects node completion.
set -g alternate-screen off
# Keep a pane's final content visible after the program exits.
#   - tmux force-clears the screen on client exit and refuses to start without a
#     `clear` capability, so we REDEFINE clear instead of removing it.
#   - clear=\E[999;1H moves the cursor to the bottom row (clamped) and does NOT
#     erase. So content stays, and the "[exited]" tmux prints afterwards lands at
#     the bottom instead of clobbering line 1 — needed because some TUIs (claude)
#     home the cursor on exit, which a no-move clear would leave at the top.
#   - smcup@/rmcup@ stop the client using the alternate screen.
# tmux repositions every cell on its own redraws, so live rendering is unaffected,
# and the session still ends normally (so the coordinator detects completion).
set -ga terminal-overrides ',*:smcup@:rmcup@:clear=\E[999;1H'
