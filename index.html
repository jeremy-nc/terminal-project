<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; height: 100vh;
      background: #1e1e1e; color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; background: #252526; border-bottom: 1px solid #333;
    }
    .toolbar .title { font-weight: 600; font-size: 14px; }
    .toolbar .status { font-size: 12px; color: #888; margin-left: auto; }
    .toolbar button {
      background: #0e639c; color: #fff; border: none; border-radius: 4px;
      padding: 4px 10px; font-size: 12px; cursor: pointer;
    }
    .toolbar button:hover { background: #1177bb; }
    /* Tab bar: one tab per concurrent PTY session. */
    .tabbar {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; background: #2d2d2d; border-bottom: 1px solid #333;
      overflow-x: auto;
    }
    .tabs { display: flex; gap: 4px; }
    .tab {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; background: #252526; color: #aaa;
      border: 1px solid #333; border-bottom: none; border-radius: 5px 5px 0 0;
      font-size: 12px; cursor: pointer; white-space: nowrap;
    }
    .tab.active { background: #1e1e1e; color: #fff; }
    .tab-close { color: #888; font-size: 14px; line-height: 1; }
    .tab-close:hover { color: #fff; }
    .new-tab {
      background: transparent; color: #ccc; border: none;
      font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 8px;
    }
    .new-tab:hover { color: #fff; }
    .stage { flex: 1; display: flex; min-height: 0; }
    .main-pane { flex: 1; min-width: 0; padding: 6px; background: #1e1e1e; }
    /* The mirror is a read-only, visually distinct copy of the same stream. */
    .mirror-pane {
      width: 360px; padding: 6px; background: #15171a;
      border-left: 1px solid #333; display: flex; flex-direction: column;
    }
    .mirror-pane .label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #6a9955; margin-bottom: 4px;
    }
    #mirror-hosts { flex: 1; min-height: 0; }
    .term-host { width: 100%; height: 100%; }
    /* One host div per tab; only the active tab's hosts are shown. */
    .tab-term { width: 100%; height: 100%; }
    .tab-mirror { width: 100%; height: 100%; opacity: 0.85; }
    .tab-host.hidden { display: none; }
    .inputbar {
      display: flex; gap: 8px; padding: 8px 12px;
      background: #252526; border-top: 1px solid #333;
    }
    .inputbar input {
      flex: 1; background: #1e1e1e; color: #ddd; border: 1px solid #3c3c3c;
      border-radius: 4px; padding: 8px 10px; font-family: monospace; font-size: 13px;
    }
    .inputbar input:focus { outline: none; border-color: #0e639c; }
    .inputbar button {
      background: #0e639c; color: #fff; border: none; border-radius: 4px;
      padding: 0 16px; cursor: pointer;
    }
    .inputbar button:hover { background: #1177bb; }
  </style>
</head>
<body>
  <div class="tabbar">
    <div class="tabs" id="tabs"></div>
    <button class="new-tab" id="new-tab" title="New tab">+</button>
  </div>
  <div class="toolbar">
    <span class="title">Browser Terminal</span>
    <button id="restart">Restart Tab</button>
    <span class="status" id="status">connecting…</span>
  </div>
  <div class="stage">
    <div class="main-pane" id="main-hosts"></div>
    <div class="mirror-pane">
      <div class="label">Mirror (read-only)</div>
      <div id="mirror-hosts"></div>
    </div>
  </div>
  <div class="inputbar">
    <input id="cmd" type="text" placeholder="Type a command and press Enter…" autocomplete="off" />
    <button id="send">Send</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
