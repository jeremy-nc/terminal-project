# Minimal isolated tmux config for browser-terminal sessions (socket: -L nct).
# Kept separate from the user's own ~/.tmux.conf via `tmux -f`.

# Size the shared session to the SMALLEST attached client. With multiple viewers
# of different widths (a node card + the focused Share view + other windows), the
# grid then never exceeds any viewer's width, so none of them render content
# wider than themselves and wrap it misaligned (the scrambled-text symptom).
# Larger viewers just show the grid with some empty margin.
set -g window-size smallest
setw -g aggressive-resize off

# No status bar: a browser tab should look like a plain shell, not tmux.
set -g status off

# Snappy escape handling and broad-compatible terminal type.
set -g escape-time 0
set -g default-terminal "xterm-256color"

# Keep a pane's final content visible after the program exits (see the
# investigation; this is being tuned to also render interactive TUIs cleanly).
set -g alternate-screen off
set -ga terminal-overrides ',*:smcup@:rmcup@:clear=\E[999;1H'
